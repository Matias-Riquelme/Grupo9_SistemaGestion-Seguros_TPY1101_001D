# ========== CORS CONFIGURATION ==========
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000,http://localhost:4200,http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600

# ========== DEFAULT FILTERS ==========
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# ========== KEYCLOAK CONFIGURATION ==========
keycloak.realm=${KEYCLOAK_REALM}
keycloak.auth-server-url=${KEYCLOAK_SERVER_URL}
keycloak.ssl-required=external
keycloak.resource=${KEYCLOAK_CLIENT_ID}
keycloak.credentials.secret=${KEYCLOAK_CLIENT_SECRET}
keycloak.use-resource-role-mappings=true

# ========== JWT CONFIGURATION ==========
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# ========== LOGGING ==========
logging.level.root=INFO
logging.level.tad.ApiGateway=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.keycloak=DEBUG

# ========== ACTUATOR ==========
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true

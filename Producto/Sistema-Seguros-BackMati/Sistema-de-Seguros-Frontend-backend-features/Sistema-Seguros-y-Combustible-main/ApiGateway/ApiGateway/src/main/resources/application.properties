# ========== APPLICATION ==========
spring.application.name=api-gateway
server.port=8080

# Deshabilitar Spring Cloud Config
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Permitir sobreescritura de beans (necesario para WebFlux + Security)
spring.main.allow-bean-definition-overriding=true
spring.main.web-application-type=reactive

# ========== SPRING CLOUD GATEWAY ROUTES ==========

# --- GESTIÓN DE USUARIOS (Puerto 8081) ---
# Rutas con /api para coincidir con @RequestMapping("/api/keycloak/...") del backend
spring.cloud.gateway.routes[0].id=usuarios-keycloak-user
spring.cloud.gateway.routes[0].uri=http://usuario-service:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/keycloak/user/**

spring.cloud.gateway.routes[1].id=usuarios-keycloak-roles
spring.cloud.gateway.routes[1].uri=http://usuario-service:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/keycloak/roles/**

# --- VEHÍCULOS Y COMBUSTIBLE (Puerto 8083) ---
spring.cloud.gateway.routes[2].id=vehiculos-service
spring.cloud.gateway.routes[2].uri=http://vehiculo-combustible-service:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/vehiculos,/api/vehiculos/**

spring.cloud.gateway.routes[3].id=combustible-service
spring.cloud.gateway.routes[3].uri=http://vehiculo-combustible-service:8083
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/combustible/**

